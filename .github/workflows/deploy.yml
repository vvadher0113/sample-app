name: Build, Security Scan & Deploy to Azure App Service

on:
  workflow_dispatch: # Manual trigger
  # Uncomment below to trigger on push
  # push:
  #   branches: [ main ]

env:
  DOTNET_VERSION: "8.0.x"
  BUILD_CONFIGURATION: Release
  APP_SERVICE_NAME: vv-test-gh-as # Update with your Azure App Service name
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

permissions:
  contents: read
  id-token: write # Required for Azure OIDC login
  security-events: write # Required for uploading SARIF to GitHub Security tab

jobs:
  # ============================================================
  # Job 1: Build
  # ============================================================
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SampleApp/SampleApp.csproj

      - name: Build
        run: dotnet build SampleApp/SampleApp.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Publish
        run: dotnet publish SampleApp/SampleApp.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  # ============================================================
  # Job 2: Secret Detection (Gitleaks)
  # ============================================================
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: "" # No license needed for public repos

  # ============================================================
  # Job 3: Dependency Scan (Trivy)
  # ============================================================
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SampleApp/SampleApp.csproj

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          format: table
        continue-on-error: true

      - name: Run Trivy (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ============================================================
  # Job 4: SAST — CodeQL Analysis
  # ============================================================
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build for CodeQL
        run: dotnet build SampleApp/SampleApp.csproj --configuration ${{ env.BUILD_CONFIGURATION }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # ============================================================
  # Job 5: .NET Package Vulnerability Audit
  # ============================================================
  dotnet-audit:
    name: .NET Package Vulnerability Audit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SampleApp/SampleApp.csproj

      - name: Run .NET package vulnerability audit
        run: |
          echo "=== .NET Package Vulnerability Audit ===" > dotnet-audit-report.txt
          dotnet list SampleApp/SampleApp.csproj package --vulnerable --include-transitive 2>&1 | tee -a dotnet-audit-report.txt
          echo "" >> dotnet-audit-report.txt
          echo "=== .NET Package Deprecation Check ===" >> dotnet-audit-report.txt
          dotnet list SampleApp/SampleApp.csproj package --deprecated 2>&1 | tee -a dotnet-audit-report.txt
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-audit-report
          path: dotnet-audit-report.txt

  # ============================================================
  # Job 6: Deploy to Azure App Service
  # ============================================================
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: [build, secret-scan, dependency-scan, sast, dotnet-audit]
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./webapp

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          package: ./webapp
